<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瑞喆CRM · 电销助手</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; padding: 16px; max-width: 500px; margin: 0 auto; }
        .app-card { background: white; border-radius: 32px; padding: 24px 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { font-size: 24px; font-weight: 600; color: #0f172a; }
        .header i { font-size: 24px; color: #3b82f6; }
        .stats { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; border-radius: 24px; padding: 20px; margin-bottom: 24px; display: flex; justify-content: space-between; cursor: pointer; }
        .stats-item { text-align: center; flex: 1; padding: 4px; border-radius: 16px; transition: background 0.2s; }
        .stats-item:hover { background: rgba(255,255,255,0.2); }
        .stats-item .num { font-size: 28px; font-weight: 700; }
        .stats-item .label { font-size: 14px; opacity: 0.9; }
        .tabs { display: flex; gap: 8px; background: #f1f5f9; padding: 6px; border-radius: 40px; margin-bottom: 24px; }
        .tab { flex: 1; padding: 12px; text-align: center; border-radius: 30px; font-weight: 600; color: #64748b; cursor: pointer; transition: 0.2s; }
        .tab.active { background: white; color: #3b82f6; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .panel { display: none; }
        .panel.active { display: block; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #e2e8f0; }
        .list-item:last-child { border-bottom: none; }
        .item-info .name { font-weight: 500; cursor: pointer; color: #2563eb; }
        .item-info .name:hover { text-decoration: underline; }
        .item-info .meta { font-size: 13px; color: #64748b; }
        .badge { background: #dbeafe; color: #2563eb; padding: 4px 8px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .btn-primary { background: #3b82f6; color: white; border: none; padding: 14px; border-radius: 40px; font-weight: 600; width: 100%; margin-top: 16px; cursor: pointer; }
        .btn-outline { background: white; border: 1px solid #cbd5e1; padding: 10px 14px; border-radius: 30px; color: #1e293b; cursor: pointer; font-size: 14px; }
        .btn-icon { background: white; border: 1px solid #cbd5e1; padding: 8px 12px; border-radius: 30px; color: #1e293b; cursor: pointer; font-size: 14px; display: inline-flex; align-items: center; gap: 4px; }
        .modal { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 400px; border-radius: 32px; padding: 24px; max-height: 70vh; overflow-y: auto; }
        .modal-content input, .modal-content textarea { width: 100%; padding: 14px; margin: 8px 0 16px; border: 1px solid #cbd5e1; border-radius: 30px; font-size: 16px; }
        .close { float: right; font-size: 24px; cursor: pointer; }
        .follow-item { font-size: 14px; padding: 8px 0; border-bottom: 1px dashed #e2e8f0; }
        .refresh-btn { display: flex; justify-content: flex-end; margin-bottom: 8px; }
        .history-list { max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="app-card">
    <div class="header">
        <h1>瑞喆CRM</h1>
        <i class="fas fa-user-circle"></i>
    </div>

    <!-- 手动刷新按钮 -->
    <div class="refresh-btn">
        <button class="btn-outline" id="refreshBtn" style="width: auto; padding: 8px 16px;"><i class="fas fa-sync-alt"></i> 刷新数据</button>
    </div>

    <!-- 可点击的统计卡片 -->
    <div class="stats">
        <div class="stats-item" id="statsCustomer">
            <span class="num" id="customerCount">0</span>
            <div class="label">客户</div>
        </div>
        <div class="stats-item" id="statsPool">
            <span class="num" id="poolCount">0</span>
            <div class="label">公海</div>
        </div>
        <div class="stats-item" id="statsFollow">
            <span class="num" id="todayFollow">0</span>
            <div class="label">今日跟进</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="customer">客户管理</div>
        <div class="tab" data-tab="pool">公海池</div>
        <div class="tab" data-tab="profile">我的</div>
    </div>

    <!-- 客户管理面板 -->
    <div id="customerPanel" class="panel active">
        <div style="display: flex; gap: 8px; margin-bottom: 16px;">
            <input type="text" id="searchCustomer" placeholder="搜索客户" style="flex:1; padding:12px; border:1px solid #e2e8f0; border-radius:30px;">
            <button class="btn-outline" style="width:auto;" id="addCustomerBtn"><i class="fas fa-plus"></i> 新增</button>
        </div>
        <div id="customerList"></div>
    </div>

    <!-- 公海池面板 -->
    <div id="poolPanel" class="panel">
        <div id="poolList"></div>
    </div>

    <!-- 我的面板 -->
    <div id="profilePanel" class="panel">
        <h3 style="margin-bottom:16px;">绑定手机号</h3>
        <div id="phoneList"></div>
        <button class="btn-outline" style="width:100%; margin-top:16px;" id="addPhoneBtn">+ 添加手机号</button>
        <hr style="margin:24px 0;">
        <h3 style="margin-bottom:16px;">跟进记录</h3>
        <div id="followList" class="history-list"></div>
        <hr style="margin:24px 0;">
        <h3 style="margin-bottom:16px;">回收规则</h3>
        <div>7天未跟进自动回收</div>
        <button class="btn-primary" style="margin-top:16px;">保存设置</button>
    </div>
</div>

<!-- 添加客户弹窗 -->
<div id="customerModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>新建客户</h3>
        <input type="text" id="custName" placeholder="客户姓名">
        <input type="tel" id="custPhone" placeholder="手机号">
        <button id="saveCustomerBtn" class="btn-primary">保存</button>
    </div>
</div>

<!-- 添加手机号弹窗 -->
<div id="phoneModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>绑定手机号</h3>
        <input type="tel" id="phoneNumber" placeholder="手机号">
        <input type="text" id="phoneDesc" placeholder="备注（如 卡1）">
        <button id="savePhoneBtn" class="btn-primary">保存</button>
    </div>
</div>

<!-- 跟进记录弹窗（用于展示单个客户的所有跟进） -->
<div id="followHistoryModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>跟进历史</h3>
        <div id="followHistoryList" class="history-list"></div>
    </div>
</div>

<!-- 添加跟进弹窗（快速记录） -->
<div id="followModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <h3>记录跟进</h3>
        <input type="hidden" id="followCustomerId">
        <input type="text" id="followContent" placeholder="跟进内容（如：有意向/空号/加微信）">
        <button id="saveFollowBtn" class="btn-primary">保存</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://hgmjwcpvhaacgzsmvtkp.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_kUGFH7AVvRBWT90iT-R5iQ_ngyHOmx0';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let state = {
        customers: [],
        pool: [],
        phones: [],
        followups: []
    };

    // 从 Supabase 加载数据
    async function loadFromCloud() {
        try {
            const { data, error } = await supabaseClient
                .from('crm_data')
                .select('*')
                .single();
            if (data) {
                state = { ...state, ...data.data };
            }
        } catch (e) {
            console.warn('云端加载失败，使用本地空数据');
        }
        renderAll();
    }

    // 保存到 Supabase
    async function saveToCloud() {
        try {
            await supabaseClient
                .from('crm_data')
                .upsert({ id: 1, data: state });
        } catch (e) {
            console.warn('云端保存失败', e);
        }
    }

    function saveState() {
        saveToCloud();
        renderAll();
    }

    // 手机号脱敏
    function maskPhone(phone) {
        if (!phone || phone.length < 11) return phone;
        return phone.substring(0, 3) + '****' + phone.substring(7);
    }

    // 渲染所有界面
    function renderAll() {
        document.getElementById('customerCount').innerText = state.customers.length;
        document.getElementById('poolCount').innerText = state.pool.length;
        document.getElementById('todayFollow').innerText = state.followups.filter(f => {
            if (!f.time) return false;
            return new Date(f.time).toDateString() === new Date().toDateString();
        }).length;

        // 客户列表（姓名可点击查看跟进历史）
        const customerList = document.getElementById('customerList');
        customerList.innerHTML = state.customers.map(c => `
            <div class="list-item">
                <div class="item-info">
                    <div class="name" onclick="showFollowHistory(${c.id})">${c.name}</div>
                    <div class="meta">${maskPhone(c.phone)}</div>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-icon" onclick="callCustomer('${c.phone}')"><i class="fas fa-phone"></i> 拨号</button>
                    <button class="btn-icon" onclick="followCustomer(${c.id})"><i class="fas fa-pen"></i> 跟进</button>
                </div>
            </div>
        `).join('');

        // 公海列表
        const poolList = document.getElementById('poolList');
        poolList.innerHTML = state.pool.map(p => `
            <div class="list-item">
                <div>
                    <div class="name">${p.name}</div>
                    <div class="meta">${maskPhone(p.phone)}</div>
                </div>
                <button class="btn-outline" style="width:auto;" onclick="claimCustomer(${p.id})">领取</button>
            </div>
        `).join('');

        // 手机号列表
        const phoneList = document.getElementById('phoneList');
        phoneList.innerHTML = state.phones.map(p => `
            <div class="list-item">
                <span>${p.desc || '默认'} · ${maskPhone(p.number)}</span>
                <i class="fas fa-trash" style="color:#ef4444; cursor:pointer;" onclick="deletePhone('${p.number}')"></i>
            </div>
        `).join('');

        // 跟进记录（我的页面底部）
        const followList = document.getElementById('followList');
        if (state.followups.length === 0) {
            followList.innerHTML = '<div style="color:#94a3b8;">暂无跟进记录</div>';
        } else {
            followList.innerHTML = state.followups.slice(-10).reverse().map(f => {
                const customer = state.customers.find(c => c.id === f.customerId) || { name: '未知客户' };
                return `
                    <div class="follow-item">
                        <div><strong>${customer.name}</strong> ${f.content}</div>
                        <div style="color:#64748b;">${new Date(f.time).toLocaleString()}</div>
                    </div>
                `;
            }).join('');
        }
    }

    // 拨号
    window.callCustomer = function(phone) {
        window.location.href = 'tel:' + phone;
    };

    window.claimCustomer = function(id) {
        const customer = state.pool.find(c => c.id === id);
        if (customer) {
            state.pool = state.pool.filter(c => c.id !== id);
            state.customers.push(customer);
            saveState();
        }
    };

    window.deletePhone = function(number) {
        state.phones = state.phones.filter(p => p.number !== number);
        saveState();
    };

    window.followCustomer = function(customerId) {
        const customer = state.customers.find(c => c.id === customerId);
        if (!customer) return;
        document.getElementById('followCustomerId').value = customerId;
        document.getElementById('followContent').value = '';
        followModal.style.display = 'flex';
    };

    // 显示单个客户的跟进历史
    window.showFollowHistory = function(customerId) {
        const customer = state.customers.find(c => c.id === customerId);
        if (!customer) return;
        const history = state.followups.filter(f => f.customerId === customerId).map(f => `
            <div class="follow-item">
                <div>${f.content}</div>
                <div style="color:#64748b;">${new Date(f.time).toLocaleString()}</div>
            </div>
        `).join('');
        const modalContent = document.getElementById('followHistoryList');
        if (history) {
            modalContent.innerHTML = history;
        } else {
            modalContent.innerHTML = '<div style="color:#94a3b8;">暂无跟进记录</div>';
        }
        followHistoryModal.style.display = 'flex';
    };

    // 弹窗控制
    const custModal = document.getElementById('customerModal');
    const phoneModal = document.getElementById('phoneModal');
    const followModal = document.getElementById('followModal');
    const followHistoryModal = document.getElementById('followHistoryModal');

    document.getElementById('addCustomerBtn').onclick = () => {
        custModal.style.display = 'flex';
    };
    document.getElementById('addPhoneBtn').onclick = () => {
        phoneModal.style.display = 'flex';
    };

    document.querySelectorAll('.close').forEach(btn => {
        btn.onclick = () => {
            custModal.style.display = 'none';
            phoneModal.style.display = 'none';
            followModal.style.display = 'none';
            followHistoryModal.style.display = 'none';
        };
    });
    window.onclick = (e) => {
        if (e.target === custModal) custModal.style.display = 'none';
        if (e.target === phoneModal) phoneModal.style.display = 'none';
        if (e.target === followModal) followModal.style.display = 'none';
        if (e.target === followHistoryModal) followHistoryModal.style.display = 'none';
    };

    document.getElementById('saveCustomerBtn').onclick = () => {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        if (name && phone) {
            state.pool.push({ name, phone, id: Date.now() });
            saveState();
            custModal.style.display = 'none';
            document.getElementById('custName').value = '';
            document.getElementById('custPhone').value = '';
        } else {
            alert('请填写完整信息');
        }
    };

    document.getElementById('savePhoneBtn').onclick = () => {
        const number = document.getElementById('phoneNumber').value.trim();
        const desc = document.getElementById('phoneDesc').value.trim() || '默认';
        if (number) {
            state.phones.push({ number, desc });
            saveState();
            phoneModal.style.display = 'none';
            document.getElementById('phoneNumber').value = '';
            document.getElementById('phoneDesc').value = '';
        } else {
            alert('请填写手机号');
        }
    };

    document.getElementById('saveFollowBtn').onclick = () => {
        const customerId = document.getElementById('followCustomerId').value;
        const content = document.getElementById('followContent').value.trim();
        if (!content) {
            alert('请输入跟进内容');
            return;
        }
        const customer = state.customers.find(c => c.id == customerId);
        if (customer) {
            state.followups.push({
                customerId: customer.id,
                customerName: customer.name,
                content,
                time: new Date().toISOString()
            });
            saveState();
            followModal.style.display = 'none';
            document.getElementById('followContent').value = '';
        }
    };

    // 统计卡片点击事件
    document.getElementById('statsCustomer').onclick = () => switchTab('customer');
    document.getElementById('statsPool').onclick = () => switchTab('pool');
    document.getElementById('statsFollow').onclick = () => switchTab('profile');

    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelector(`.tab[data-tab="${tabName}"]`).classList.add('active');
        document.getElementById(tabName + 'Panel').classList.add('active');
        // 每次切换时刷新数据
        loadFromCloud();
    }

    // 标签切换（保留原有功能）
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
            loadFromCloud();
        };
    });

    // 手动刷新按钮
    document.getElementById('refreshBtn').onclick = () => {
        loadFromCloud();
    };

    // 定时自动刷新（每10秒）
    setInterval(() => {
        loadFromCloud();
    }, 10000);

    // 页面可见时自动刷新（比如从后台切回来）
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) {
            loadFromCloud();
        }
    });

    // 初始化加载
    loadFromCloud();
</script>
</body>
</html>
